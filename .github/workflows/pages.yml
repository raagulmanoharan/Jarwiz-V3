# Publishes the marketing site (/site) plus a live, embeddable build of the
# real app (/app) to GitHub Pages.
#
# One-time setup: repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Then every push to main (or a manual run) rebuilds
# and publishes. The landing page embeds the app at ./app/?embed=1.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Build app (served under /<repo>/app)
        run: npm run build --workspace=apps/web
        env:
          VITE_BASE: /${{ github.event.repository.name }}/app/

      - name: Assemble Pages artifact (landing + app)
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/app
          cp -r apps/web/dist/. _site/app/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically (via the workflow's pages:write token)
          # so no manual Settings → Pages toggle is needed.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

# Redeploy trigger: retry after transient Pages publish error (Deploy step).
