<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Inter,sans-serif;background:#0b0b0e;color:#f5f5f7;height:100%;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
.bar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px 0;font-size:12px;font-weight:600}
.bar .dots{display:flex;gap:4px}.bar .dots i{width:4px;height:4px;border-radius:50%;background:#6b6b76}
.mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:6px 18px}
.day{font-size:12px;color:#8a8a94;font-weight:600}
h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
.ring{position:relative;display:grid;place-items:center}
.ring svg{transform:rotate(-90deg)}
.ring .cx{position:absolute;text-align:center}
.ring .cx .big{font-size:26px;font-weight:800;letter-spacing:-.03em;white-space:nowrap}
.ring .cx .sm{font-size:11px;color:#8a8a94;margin-top:1px;font-weight:600}
.go{width:100%;max-width:230px;padding:12px;border-radius:14px;background:#f5f5f7;color:#0b0b0e;font-weight:700;font-size:14px;text-align:center;white-space:nowrap}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.chip{display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:11px;background:#151519;border:1px solid rgba(255,255,255,.06);font-size:12px;font-weight:600}
.chip .m{color:#8a8a94;font-weight:600}
</style></head><body>
<div class="bar"><span>9:41</span><span class="dots"><i></i><i></i><i></i></span></div>
<div class="mid">
  <div style="text-align:center"><div class="day">Wednesday, July 8</div><h1>Focus</h1></div>
  <div class="ring">
    <svg width="150" height="150" viewBox="0 0 150 150">
      <circle cx="75" cy="75" r="64" fill="none" stroke="#1c1c22" stroke-width="11"/>
      <circle cx="75" cy="75" r="64" fill="none" stroke="#f5f5f7" stroke-width="11" stroke-linecap="round" stroke-dasharray="402" stroke-dashoffset="120"/>
    </svg>
    <div class="cx"><div class="big">2h 40m</div><div class="sm">focused · 70%</div></div>
  </div>
  <div class="go">Start a focus session</div>
  <div class="chips">
    <div class="chip">🧠 Deep work <span class="m">50m</span></div>
    <div class="chip">📖 Reading <span class="m">25m</span></div>
  </div>
</div>
</body></html>
