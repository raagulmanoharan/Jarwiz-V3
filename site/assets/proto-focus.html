<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Inter,sans-serif;background:radial-gradient(120% 80% at 50% 0%, #17171d 0%, #0b0b0e 60%);color:#f5f5f7;height:100%;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
.bar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px 0;font-size:12px;font-weight:600}
.bar .dots{display:flex;gap:4px}.bar .dots i{width:4px;height:4px;border-radius:50%;background:#6b6b76}
.mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:8px 20px}
.tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#c2c2c8;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.tag .live{width:6px;height:6px;border-radius:50%;background:#f5f5f7;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.ring{position:relative;display:grid;place-items:center;margin:2px 0}
.ring svg{transform:rotate(-90deg)}
.ring .track{stroke:#1c1c22}
.ring .prog{stroke:#f5f5f7;stroke-linecap:round;transition:stroke-dashoffset .95s linear}
.ring .cx{position:absolute;text-align:center}
.ring .cx .big{font-size:40px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.ring .cx .sm{font-size:11px;color:#8a8a94;margin-top:2px;font-weight:600;letter-spacing:.02em}
.ctrls{display:flex;align-items:center;gap:12px}
.btn{height:48px;border-radius:15px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;white-space:nowrap;cursor:pointer}
.btn.pause{background:#f5f5f7;color:#0b0b0e;padding:0 26px}
.btn.ghost{width:48px;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#c2c2c8;font-size:18px}
.pips{display:flex;align-items:center;gap:7px;font-size:11px;color:#8a8a94;font-weight:600}
.pips i{width:7px;height:7px;border-radius:50%;background:#2a2a31}
.pips i.on{background:#f5f5f7}
</style></head><body>
<div class="bar"><span>9:41</span><span class="dots"><i></i><i></i><i></i></span></div>
<div class="mid">
  <span class="tag"><span class="live"></span> Deep work</span>
  <div class="ring">
    <svg width="176" height="176" viewBox="0 0 176 176">
      <circle class="track" cx="88" cy="88" r="76" fill="none" stroke-width="12"/>
      <circle class="prog" id="prog" cx="88" cy="88" r="76" fill="none" stroke-width="12"/>
    </svg>
    <div class="cx"><div class="big" id="time">24:12</div><div class="sm">remaining</div></div>
  </div>
  <div class="ctrls">
    <button class="btn ghost" tabindex="-1" aria-hidden="true">⏻</button>
    <button class="btn pause" tabindex="-1" aria-hidden="true">Pause</button>
  </div>
  <div class="pips">Session 2 of 4 &nbsp; <i class="on"></i><i class="on"></i><i></i><i></i></div>
</div>
<script>
  var TOTAL = 25*60, r = 76, C = 2*Math.PI*r, remaining = 24*60+12;
  var prog = document.getElementById('prog'), time = document.getElementById('time');
  prog.style.strokeDasharray = C;
  function render(){
    var m = Math.floor(remaining/60), s = remaining%60;
    time.textContent = m + ':' + (s<10?'0':'') + s;
    prog.style.strokeDashoffset = C * (1 - remaining/TOTAL);
  }
  render();
  setInterval(function(){ remaining--; if(remaining<0) remaining = TOTAL-1; render(); }, 1000);
</script>
</body></html>
