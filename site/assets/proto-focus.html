<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Inter,sans-serif;background:radial-gradient(120% 70% at 50% 0%, #17171d 0%, #0b0b0e 55%);color:#f5f5f7;height:100%;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden;padding-bottom:14px}
.bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 0;font-size:12px;font-weight:600}
.bar .dots{display:flex;gap:4px}.bar .dots i{width:4px;height:4px;border-radius:50%;background:#6b6b76}
.top{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 20px 2px}
.tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#c2c2c8;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.tag .live{width:6px;height:6px;border-radius:50%;background:#f5f5f7;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
.ring{position:relative;display:grid;place-items:center}
.ring svg{transform:rotate(-90deg)}
.ring .track{stroke:#1c1c22}
.ring .prog{stroke:#f5f5f7;stroke-linecap:round;transition:stroke-dashoffset .95s linear}
.ring .cx{position:absolute;text-align:center}
.ring .cx .big{font-size:38px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.ring .cx .sm{font-size:11px;color:#8a8a94;margin-top:2px;font-weight:600}
.ctrls{display:flex;align-items:center;gap:12px}
.btn{height:46px;border-radius:14px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center;border:1px solid transparent;white-space:nowrap}
.btn.pause{background:#f5f5f7;color:#0b0b0e;padding:0 30px}
.btn.ghost{width:46px;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#c2c2c8;font-size:17px}
.pips{display:flex;align-items:center;gap:7px;font-size:11px;color:#8a8a94;font-weight:600}
.pips i{width:7px;height:7px;border-radius:50%;background:#2a2a31}.pips i.on{background:#f5f5f7}
.sheet{margin:12px 16px 0;background:#121216;border:1px solid rgba(255,255,255,.07);border-radius:18px 18px 0 0;flex:1;padding:14px 18px 18px;display:flex;flex-direction:column;gap:12px;min-height:0}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:11px 12px}
.stat .n{font-size:19px;font-weight:800;letter-spacing:-.02em}
.stat .l{font-size:10px;color:#8a8a94;font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.wk{flex:1;display:flex;flex-direction:column;min-height:0}
.wk .h{font-size:11px;color:#8a8a94;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.wk .bars{flex:1;display:flex;align-items:flex-end;gap:9px;min-height:34px}
.wk .bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.wk .bars .col b{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,#e7e7ea,#8a8a94);display:block}
.wk .bars .col.today b{background:#f5f5f7}
.wk .bars .col span{font-size:9px;color:#6b6b76;font-weight:600}
</style></head><body>
<div class="bar"><span>9:41</span><span class="dots"><i></i><i></i><i></i></span></div>
<div class="top">
  <span class="tag"><span class="live"></span> Deep work · session 2</span>
  <div class="ring">
    <svg width="128" height="128" viewBox="0 0 128 128">
      <circle class="track" cx="64" cy="64" r="55" fill="none" stroke-width="10"/>
      <circle class="prog" id="prog" cx="64" cy="64" r="55" fill="none" stroke-width="10"/>
    </svg>
    <div class="cx"><div class="big" id="time">24:05</div><div class="sm">remaining</div></div>
  </div>
  <div class="ctrls">
    <button class="btn ghost" tabindex="-1" aria-hidden="true">⏻</button>
    <button class="btn pause" tabindex="-1" aria-hidden="true">Pause</button>
  </div>
  <div class="pips">Session 2 of 4 &nbsp; <i class="on"></i><i class="on"></i><i></i><i></i></div>
</div>
<div class="sheet">
  <div class="stats">
    <div class="stat"><div class="n">2h 40m</div><div class="l">Focused</div></div>
    <div class="stat"><div class="n">6</div><div class="l">Sessions</div></div>
    <div class="stat"><div class="n">12d</div><div class="l">Streak</div></div>
  </div>
  <div class="wk">
    <div class="h">This week</div>
    <div class="bars">
      <div class="col"><b style="height:42%"></b><span>M</span></div>
      <div class="col"><b style="height:66%"></b><span>T</span></div>
      <div class="col"><b style="height:54%"></b><span>W</span></div>
      <div class="col"><b style="height:80%"></b><span>T</span></div>
      <div class="col"><b style="height:60%"></b><span>F</span></div>
      <div class="col"><b style="height:34%"></b><span>S</span></div>
      <div class="col today"><b style="height:92%"></b><span>S</span></div>
    </div>
  </div>
</div>
<script>
  var TOTAL=25*60, r=55, C=2*Math.PI*r, remaining=24*60+5;
  var prog=document.getElementById('prog'), time=document.getElementById('time');
  prog.style.strokeDasharray=C;
  function render(){var m=Math.floor(remaining/60),s=remaining%60;time.textContent=m+':'+(s<10?'0':'')+s;prog.style.strokeDashoffset=C*(1-remaining/TOTAL);}
  render(); setInterval(function(){remaining--;if(remaining<0)remaining=TOTAL-1;render();},1000);
</script>
</body></html>
