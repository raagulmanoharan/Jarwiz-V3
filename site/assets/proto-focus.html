<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Inter,sans-serif;background:#0b0b0e;color:#f5f5f7;height:100%;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 6px;font-size:13px;font-weight:600;color:#f5f5f7}
.bar .dots{display:flex;gap:5px}.bar .dots i{width:5px;height:5px;border-radius:50%;background:#6b6b76}
.hd{padding:14px 22px 2px}.hd .day{font-size:13px;color:#8a8a94;font-weight:600;letter-spacing:.02em}
.hd h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.ring{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 0 8px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .cx{position:absolute;top:50%;left:50%;transform:translate(-50%,-42%);text-align:center}
.ring .cx .big{font-size:32px;font-weight:800;letter-spacing:-.03em;white-space:nowrap}
.ring .cx .sm{font-size:12px;color:#8a8a94;margin-top:2px;font-weight:600}
.go{margin:6px 18px 4px;padding:14px;border-radius:16px;background:#f5f5f7;color:#0b0b0e;font-weight:700;font-size:14px;text-align:center;letter-spacing:-.01em;cursor:pointer;white-space:nowrap}
.lbl{padding:16px 22px 8px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b6b76}
.list{padding:0 14px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.row{display:flex;align-items:center;gap:13px;padding:12px 12px;border-radius:14px;background:#151519;border:1px solid rgba(255,255,255,.06)}
.row .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;background:rgba(255,255,255,.06)}
.row .t{flex:1}.row .t .n{font-size:14.5px;font-weight:700;letter-spacing:-.01em}
.row .t .d{font-size:12px;color:#8a8a94;margin-top:1px}
.row .m{font-size:13px;color:#c2c2c8;font-weight:600;font-variant-numeric:tabular-nums}
.tabs{margin-top:auto;display:flex;justify-content:space-around;padding:12px 0 16px;border-top:1px solid rgba(255,255,255,.06);background:#0b0b0e}
.tabs span{font-size:21px;opacity:.4}.tabs span.on{opacity:1}
</style></head><body>
<div class="bar"><span>9:41</span><span class="dots"><i></i><i></i><i></i></span></div>
<div class="hd"><div class="day">Wednesday, July 8</div><h1>Focus</h1></div>
<div class="ring">
  <svg width="184" height="184" viewBox="0 0 184 184">
    <circle cx="92" cy="92" r="80" fill="none" stroke="#1c1c22" stroke-width="12"/>
    <circle cx="92" cy="92" r="80" fill="none" stroke="#f5f5f7" stroke-width="12" stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="150"/>
  </svg>
  <div class="cx"><div class="big">2h 40m</div><div class="sm">focused today · 70%</div></div>
</div>
<div class="go">Start a focus session</div>
<div class="lbl">Today's sessions</div>
<div class="list">
  <div class="row"><div class="ic">🧠</div><div class="t"><div class="n">Deep work</div><div class="d">Ship the landing page</div></div><div class="m">50m</div></div>
  <div class="row"><div class="ic">📖</div><div class="t"><div class="n">Reading</div><div class="d">Design systems, ch. 4</div></div><div class="m">25m</div></div>
  <div class="row"><div class="ic">✍️</div><div class="t"><div class="n">Writing</div><div class="d">Weekly review</div></div><div class="m">40m</div></div>
</div>
<div class="tabs"><span class="on">◎</span><span>▤</span><span>＋</span><span>◔</span><span>☺</span></div>
</body></html>
