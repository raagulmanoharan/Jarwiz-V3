# One-click deploy of the agent server (apps/server) to Render's free tier —
# the backend for the hosted trial at the GitHub Pages site. BYOK: no
# ANTHROPIC_API_KEY is set here; visitors bring their own key from the client
# (see apps/server/src/model.ts). Deploy: render.com → New → Blueprint → pick
# this repo. Free-tier realities: the service sleeps after ~15 min idle (first
# request wakes it in ~30-60 s) and its disk is ephemeral (uploaded assets
# reset on redeploy; boards themselves live in each visitor's browser).
services:
  - type: web
    name: jarwiz-agents
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace=packages/shared && npm run build --workspace=apps/server
    startCommand: npm run start --workspace=apps/server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # No Claude CLI on Render — skip the sidecar probe.
      - key: JZ_DISABLE_SIDECAR
        value: "1"
      # Optionally pin CORS to the Pages origin (comma-separated). Unset = any
      # origin may call, which is fine for a keyless BYOK server.
      # - key: JARWIZ_ALLOWED_ORIGINS
      #   value: https://raagulmanoharan.github.io
      #
      # Closed pilot (docs/DEPLOYMENT.md → "Running a closed pilot"): set
      # ANTHROPIC_API_KEY (dashboard, not here — it's a secret) together with
      # invite codes; the key then only answers metered, invited requests.
      # - key: JARWIZ_PILOT_CODES
      #   value: mira-x7k2,arjun-p3v9
      # - key: JARWIZ_PILOT_ACTIONS
      #   value: "100"
      # - key: JARWIZ_PILOT_TOTAL
      #   value: "1000"
      #
      # Beta signups (landing page "Request access" bar → /api/beta/signup).
      # Set these to email each signup a confirmation via Resend (resend.com);
      # unset, the address is still recorded and the client just says "you're on
      # the list" (see docs/DEPLOYMENT.md → "Beta access signups").
      # - key: RESEND_API_KEY         # dashboard secret, not here
      #   value: re_xxx
      # - key: JARWIZ_BETA_FROM
      #   value: Jarwiz <hello@yourdomain.com>
      # - key: JARWIZ_BETA_NOTIFY     # optional: CC each signup to you
      #   value: raagulmanoharan@gmail.com
